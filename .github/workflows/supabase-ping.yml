

name: Supabase Ping

on:
  schedule:
    - cron: '0 12 * * 0,1,3,5'  # Añadimos el 1 (Lunes) para recortar ventanas largas
  workflow_dispatch:

jobs:
  cron-job:
    runs-on: ubuntu-latest
    steps:
      - name: Request REST API
        run: |
          curl -X GET "${{ secrets.MI_SUPABASE_URL }}/rest/v1/roles?limit=1" \
            -H "apikey: ${{ secrets.MI_SUPA_AUTO }}" \
            -H "Authorization: Bearer ${{ secrets.MI_SUPA_AUTO }}"

            
